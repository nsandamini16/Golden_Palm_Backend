<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Golden Palm Resort</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <style>
        .auth-wrapper {
            min-height: calc(100vh - 300px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 0;
            background-color: var(--bg-light);
        }
        .auth-card {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            background-color: var(--white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border-top: 4px solid var(--accent-color);
            overflow: hidden;
        }
        .auth-card .nav-pills {
            background-color: #f8f9fa;
            padding: 1rem 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .auth-card .nav-link {
            color: var(--text-muted);
            font-weight: 600;
            border-radius: 8px 8px 0 0;
            padding: 0.8rem 1.5rem;
            margin-bottom: -1px;
            border: 1px solid transparent;
        }
        .auth-card .nav-link.active {
            background-color: var(--white);
            color: var(--primary-color);
            border-color: var(--border-color) var(--border-color) var(--white);
        }
        .auth-card .tab-content {
            padding: 2.5rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Golden<span>Palm</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="rooms.html">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" href="packages.html">Day Out Packages</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link active" href="auth.html">Login / Register</a></li>
                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0"><a class="btn btn-primary" href="rooms.html">Book Now</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            
            <ul class="nav nav-pills nav-fill" id="authTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab" aria-selected="true">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button" role="tab" aria-selected="false">
                        <i class="bi bi-person-plus me-2"></i>Register
                    </button>
                </li>
            </ul>

            <div class="tab-content" id="authTabsContent">
                <script>
                    const urlParams = new URLSearchParams(window.location.search);
                    const error = urlParams.get('error');
                    if (error) {
                        document.write('<div class="alert alert-danger shadow-sm">' + decodeURIComponent(error) + '</div>');
                    }
                    const success = urlParams.get('success');
                    if (success) {
                        document.write('<div class="alert alert-success shadow-sm">' + decodeURIComponent(success) + '</div>');
                    }
                    if (urlParams.get('tab') === 'register') {
                        // Switch to register tab automatically if ?tab=register
                        document.addEventListener("DOMContentLoaded", function() {
                            var registerTab = new bootstrap.Tab(document.querySelector('#register-tab'));
                            registerTab.show();
                        });
                    }
                </script>
                
                <div class="tab-pane fade show active" id="login-pane" role="tabpanel" tabindex="0">
                    <h3 class="fw-bold mb-4 text-center" style="color: var(--primary-color);">Welcome Back</h3>
                    <form action="auth/login.php" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Email address</label>
                            <input type="email" name="email" class="form-control" required placeholder="name@example.com">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" required placeholder="Enter password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Log In</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="register-pane" role="tabpanel" tabindex="0">
                    <h3 class="fw-bold mb-4 text-center" style="color: var(--primary-color);">Create Account</h3>
                    <form action="auth/register.php" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Full Name</label>
                            <input type="text" name="username" class="form-control" required placeholder="John Doe">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Email address</label>
                            <input type="email" name="email" class="form-control" required placeholder="name@example.com">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" required placeholder="Create password">
                        </div>
                        <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">Create Account</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
